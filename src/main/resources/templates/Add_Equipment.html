<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <title>Add Equipment</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-dark text-white text-center">
                        <h3>List New Equipment</h3>
                    </div>
                    <div class="card-body">
                        <form action="/addingEquipment" method="post">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Equipment Name:</label>
                                <input type="text" class="form-control" name="pname" required
                                    placeholder="e.g. Tractor 575 DI">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Price / Day (rs):</label>
                                <input type="number" step="0.01" class="form-control" name="pprice" required
                                    placeholder="1500.0">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Description:</label>
                                <textarea class="form-control" name="pdescription" rows="3" required
                                    placeholder="Describe the equipment condition and details..."></textarea>
                            </div>
                            <button type="submit" class="btn btn-warning w-100 fw-bold">List Equipment</button>
                        </form>
                    </div>
                    <div class="card-footer text-center">
                        <a href="/ownerDashboard" class="text-decoration-none">Cancel & Go Back</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
