<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wheel Share – Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px
        }

        .brand {
            font-size: 1.8rem;
            font-weight: 800;
            color: #f8fafc;
            margin-bottom: 32px
        }

        .brand span {
            color: #22d3ee
        }

        .card {
            background: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 420px
        }

        h2 {
            color: #f1f5f9;
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 6px
        }

        .sub {
            color: #64748b;
            font-size: 0.88rem;
            margin-bottom: 28px
        }

        label {
            display: block;
            color: #94a3b8;
            font-size: 0.82rem;
            font-weight: 600;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.04em
        }

        input {
            width: 100%;
            background: #0f172a;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #f1f5f9;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.95rem;
            margin-bottom: 20px;
            outline: none;
            transition: border 0.2s
        }

        input:focus {
            border-color: #22d3ee
        }

        button {
            width: 100%;
            background: linear-gradient(135deg, #22d3ee, #0ea5e9);
            color: #0f172a;
            border: none;
            padding: 13px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: opacity 0.2s
        }

        button:hover {
            opacity: 0.9
        }

        .msg {
            margin-top: 16px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 0.88rem;
            display: none
        }

        .msg.success {
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.2);
            display: block
        }

        .msg.error {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
            display: block
        }

        .link {
            color: #94a3b8;
            font-size: 0.88rem;
            text-align: center;
            margin-top: 20px
        }

        .link a {
            color: #22d3ee;
            text-decoration: none;
            font-weight: 600
        }

        .divider {
            border: none;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            margin: 20px 0
        }
    </style>
</head>

<body>
    <div class="brand">🚜 <span>Wheel</span>Share</div>
    <div class="card">
        <h2>Welcome Back</h2>
        <p class="sub">Login to rent or list equipment</p>
        <form id="loginForm">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="you@example.com" required>
            <label>Password</label>
            <input type="password" id="password" placeholder="Your password" required>
            <button type="submit">Login →</button>
        </form>
        <div class="msg" id="msg"></div>
        <hr class="divider">
        <div class="link">New user? <a href="/register.html">Create account</a></div>
        <div class="link" style="margin-top:10px"><a href="/equipments.html">← Browse Equipment without login</a></div>
    </div>

    <script>
        // Auto-redirect if already logged in
        if (localStorage.getItem('wsUser')) window.location.href = '/equipments.html';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msg = document.getElementById('msg');
            msg.className = 'msg'; msg.style.display = 'none';
            const res = await fetch('/api/users/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value
                })
            });
            if (res.ok) {
                const user = await res.json();
                localStorage.setItem('wsUser', JSON.stringify(user));
                msg.className = 'msg success';
                msg.textContent = '✅ Login successful! Redirecting...';
                setTimeout(() => window.location.href = '/equipments.html', 1000);
            } else {
                msg.className = 'msg error';
                msg.textContent = '❌ Invalid email or password';
            }
        });
    </script>
</body>

</html>
