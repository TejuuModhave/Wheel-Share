<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wheel Share – Add Equipment</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            min-height: 100vh;
            padding: 20px
        }

        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 0 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            margin-bottom: 40px
        }

        .brand {
            font-size: 1.4rem;
            font-weight: 800;
            color: #f8fafc
        }

        .brand span {
            color: #22d3ee
        }

        .nav-links a {
            color: #94a3b8;
            text-decoration: none;
            margin-left: 20px;
            font-size: 0.9rem;
            font-weight: 500
        }

        .nav-links a:hover {
            color: #22d3ee
        }

        .page-wrap {
            max-width: 600px;
            margin: 0 auto
        }

        h1 {
            color: #f8fafc;
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 8px
        }

        .sub {
            color: #64748b;
            margin-bottom: 32px
        }

        .card {
            background: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 36px
        }

        label {
            display: block;
            color: #94a3b8;
            font-size: 0.82rem;
            font-weight: 600;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.04em
        }

        input,
        select {
            width: 100%;
            background: #0f172a;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #f1f5f9;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.95rem;
            margin-bottom: 20px;
            outline: none;
            transition: border 0.2s
        }

        input:focus,
        select:focus {
            border-color: #22d3ee
        }

        select option {
            background: #1e293b
        }

        .preview {
            width: 100%;
            height: 180px;
            background: #0f172a;
            border-radius: 8px;
            object-fit: cover;
            margin-bottom: 20px;
            display: none;
            border: 1px solid rgba(255, 255, 255, 0.1)
        }

        button {
            background: linear-gradient(135deg, #22d3ee, #0ea5e9);
            color: #0f172a;
            border: none;
            padding: 13px 32px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: opacity 0.2s
        }

        button:hover {
            opacity: 0.9
        }

        .msg {
            margin-top: 16px;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.88rem;
            display: none;
            text-align: center
        }

        .msg.success {
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.2);
            display: block
        }

        .msg.error {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
            display: block
        }
    </style>
</head>

<body>
    <nav>
        <div class="brand">🚜 <span>Wheel</span>Share</div>
        <div class="nav-links">
            <a href="/equipments.html">Browse Equipment</a>
            <a href="/dashboard.html">Dashboard</a>
            <a href="#" id="logoutBtn">Logout</a>
        </div>
    </nav>

    <div class="page-wrap">
        <h1>List Your Equipment</h1>
        <p class="sub">Add your machinery for rent — reach thousands of farmers</p>

        <div class="card">
            <form id="eqForm">
                <label>Equipment Name</label>
                <input type="text" id="name" placeholder="e.g. John Deere 5310 Tractor" required>

                <label>Type / Category</label>
                <select id="type" required>
                    <option value="">-- Select Type --</option>
                    <option value="Tractor">Tractor</option>
                    <option value="Harvester">Harvester</option>
                    <option value="Excavator">Excavator / JCB</option>
                    <option value="Road Roller">Road Roller</option>
                    <option value="Plow">Plow</option>
                    <option value="Harrow">Harrow</option>
                    <option value="Other">Other</option>
                </select>

                <label>Rent Price Per Day (₹)</label>
                <input type="number" id="price" placeholder="e.g. 2500" required min="1">

                <label>Image URL (optional)</label>
                <input type="text" id="imgUrl" placeholder="Leave blank to use default" oninput="previewImg()">
                <img id="preview" class="preview" alt="Preview">

                <button type="submit">+ List Equipment</button>
            </form>
            <div class="msg" id="msg"></div>
        </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('wsUser') || 'null');
        if (!user) { alert('Please login first'); window.location.href = '/login.html'; }

        document.getElementById('logoutBtn').onclick = () => {
            localStorage.removeItem('wsUser');
            window.location.href = '/login.html';
        };

        function previewImg() {
            const url = document.getElementById('imgUrl').value.trim();
            const img = document.getElementById('preview');
            if (url) { img.src = url; img.style.display = 'block'; }
            else img.style.display = 'none';
        }

        document.getElementById('eqForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msg = document.getElementById('msg');
            msg.className = 'msg';
            const res = await fetch('/api/equipments', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name: document.getElementById('name').value,
                    type: document.getElementById('type').value,
                    pricePerDay: document.getElementById('price').value,
                    imageUrl: document.getElementById('imgUrl').value.trim()
                })
            });
            if (res.ok) {
                msg.className = 'msg success';
                msg.textContent = '✅ Equipment listed successfully!';
                e.target.reset();
                document.getElementById('preview').style.display = 'none';
            } else {
                msg.className = 'msg error';
                msg.textContent = '❌ Could not add equipment. Try again.';
            }
        });
    </script>
</body>

</html>
